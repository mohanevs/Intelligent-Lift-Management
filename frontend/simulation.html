<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>3D Lift Simulation | Intelligent Lift</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background: #05070a;
    }

    .simulation-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem 2rem;
      background: rgba(5, 10, 20, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(80, 140, 255, 0.2);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #98bdff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .logo span {
      font-size: 0.9rem;
      font-weight: 400;
      color: #6a8bc0;
      background: none;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #9cb2e0;
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.2s;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.03);
    }

    .back-link:hover {
      color: white;
      background: rgba(80, 140, 255, 0.15);
    }

    .info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(5, 10, 20, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(80, 140, 255, 0.3);
      padding: 1rem 1.5rem;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .serving-order {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .order-step {
      padding: 0.5rem 1rem;
      background: rgba(44, 110, 255, 0.15);
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      border-left: 2px solid #2c6eff;
      transition: all 0.3s ease;
    }

    .order-step.active {
      background: linear-gradient(135deg, #2c6eff, #004ecc);
      border-left-color: white;
      box-shadow: 0 0 15px rgba(44, 110, 255, 0.5);
      transform: scale(1.05);
    }

    .order-step.completed {
      background: rgba(16, 185, 129, 0.2);
      border-left-color: #10b981;
      text-decoration: line-through;
      opacity: 0.6;
    }

    .status-badge {
      padding: 0.5rem 1.2rem;
      background: rgba(16, 185, 129, 0.15);
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #10b981;
    }

    .reset-btn {
      padding: 0.5rem 1.2rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 40px;
      color: #f87171;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .reset-btn:hover {
      background: rgba(239, 68, 68, 0.3);
      transform: translateY(-1px);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .animating {
      animation: pulse 1s ease-in-out infinite;
    }

    .instructions {
      position: absolute;
      top: 80px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 11px;
      color: #8ab3ff;
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="simulation-header">
    <div class="logo">INTELLIGENT LIFT MANAGEMENT <span>| 3D Simulation</span></div>
    <a href="mode.html" class="back-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Modes
    </a>
  </div>

  <div class="info-panel">
    <div class="serving-order" id="servingOrder">
      Loading decision data...
    </div>
    <div style="display: flex; gap: 1rem;">
      <div class="status-badge" id="statusBadge">📍 Ready</div>
      <button class="reset-btn" id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <div class="instructions">
    🖱️ Drag to rotate | Right-click + drag to pan | Scroll to zoom
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // Floor name mapping
    const floorNames = { 0: 'Ground Floor', 1: '1st Floor', 2: '2nd Floor' };
    const floorYPositions = { 0: 0, 1: 3.5, 2: 7.0 };
    
    // Parse decision order from localStorage
    let decisionOrder = [0, 1, 2];
    let floorScores = { 0: 0, 1: 0, 2: 0 };
    
    try {
      const stored = localStorage.getItem('liftSimulationData');
      console.log('Raw stored data:', stored);
      
      if (stored) {
        const rawData = JSON.parse(stored);
        console.log('Parsed data:', rawData);
        
        // Extract order from various possible formats
        if (rawData.order && Array.isArray(rawData.order)) {
          decisionOrder = rawData.order;
        } else if (rawData.final_decision && Array.isArray(rawData.final_decision)) {
          decisionOrder = rawData.final_decision.map(step => step.floor);
        } else if (rawData.priority_queue && Array.isArray(rawData.priority_queue)) {
          decisionOrder = rawData.priority_queue.map(item => item.floor);
        }
        
        // Extract scores
        if (rawData.scores) {
          floorScores = rawData.scores;
        }
      }
    } catch (e) {
      console.error('Error parsing simulation data:', e);
    }
    
    console.log('📊 Final Decision Order:', decisionOrder.map(f => floorNames[f]));
    
    // --- Three.js Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070a);
    scene.fog = new THREE.FogExp2(0x05070a, 0.008);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(6, 5, 8);
    camera.lookAt(0, 4, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    
    // CSS2 Renderer for text labels
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = false;
    controls.enableZoom = true;
    controls.zoomSpeed = 1.2;
    controls.target.set(0, 4, 0);
    
    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffffff, 1);
    mainLight.position.set(5, 10, 7);
    mainLight.castShadow = true;
    mainLight.receiveShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    
    const fillLight = new THREE.PointLight(0x4466cc, 0.3);
    fillLight.position.set(0, -2, 0);
    scene.add(fillLight);
    
    const rimLight = new THREE.PointLight(0xffaa66, 0.4);
    rimLight.position.set(-3, 5, -5);
    scene.add(rimLight);
    
    // Helper grid
    const gridHelper = new THREE.GridHelper(15, 20, 0x3a6eff, 0x2a4a8a);
    gridHelper.position.y = -0.5;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.15;
    scene.add(gridHelper);
    
    // Create Elevator Shaft
    const shaftMaterial = new THREE.MeshStandardMaterial({ color: 0x2a3a5a, metalness: 0.3, roughness: 0.5, transparent: true, opacity: 0.4 });
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x3a6a9a, metalness: 0.5 });
    
    // Back wall
    const backWall = new THREE.Mesh(new THREE.BoxGeometry(4, 8.5, 0.2), shaftMaterial);
    backWall.position.set(0, 4, -2);
    backWall.castShadow = true;
    scene.add(backWall);
    
    // Left wall
    const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 8.5, 3), shaftMaterial);
    leftWall.position.set(-2, 4, 0);
    leftWall.castShadow = true;
    scene.add(leftWall);
    
    // Right wall
    const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 8.5, 3), shaftMaterial);
    rightWall.position.set(2, 4, 0);
    rightWall.castShadow = true;
    scene.add(rightWall);
    
    // Floor markers
    const positions = [0, 3.5, 7];
    positions.forEach((y, idx) => {
      const marker = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2.5), floorMat);
      marker.position.set(0, y + 0.05, 0);
      marker.castShadow = true;
      scene.add(marker);
      
      // Add glowing ring
      const ringGeo = new THREE.RingGeometry(1.5, 1.8, 16);
      const ringMat = new THREE.MeshStandardMaterial({ color: 0x2c6eff, emissive: 0x2c6eff, emissiveIntensity: 0.2, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.set(0, y + 0.08, 0);
      scene.add(ring);
    });
    
    // Floor labels using CSS2DRenderer
    const floorLabels = {
      0: 'GROUND FLOOR',
      1: '1ST FLOOR',
      2: '2ND FLOOR'
    };
    
    positions.forEach((y, idx) => {
      const div = document.createElement('div');
      div.textContent = floorLabels[idx];
      div.style.color = '#8ab3ff';
      div.style.fontSize = '14px';
      div.style.fontWeight = '600';
      div.style.fontFamily = 'Inter, sans-serif';
      div.style.backgroundColor = 'rgba(10, 20, 40, 0.7)';
      div.style.padding = '4px 12px';
      div.style.borderRadius = '20px';
      div.style.border = '1px solid rgba(80, 140, 255, 0.3)';
      div.style.backdropFilter = 'blur(4px)';
      
      const label = new CSS2DObject(div);
      label.position.set(-2.5, y + 0.6, 0);
      scene.add(label);
    });
    
    // Create Lift Group
    const liftGroup = new THREE.Group();
    scene.add(liftGroup);
    
    // Lift cabin
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x2c6eff, metalness: 0.6, roughness: 0.2, emissive: 0x0044aa, emissiveIntensity: 0.15 });
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 1.8), cabinMat);
    cabin.castShadow = true;
    cabin.receiveShadow = true;
    liftGroup.add(cabin);
    
    // Door frame
    const frameMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.7 });
    const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.1, 0.08), frameMat);
    doorFrame.position.set(0, 0, 0.95);
    liftGroup.add(doorFrame);
    
    // Ceiling light
    const lightMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4400, emissiveIntensity: 0.3 });
    const ceilingLight = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), lightMat);
    ceilingLight.position.set(0, 0.9, 0.5);
    liftGroup.add(ceilingLight);
    
    // Glow effect
    const glowMat = new THREE.MeshStandardMaterial({ color: 0x2c6eff, emissive: 0x2c6eff, emissiveIntensity: 0.1, transparent: true, opacity: 0.3 });
    const glowRing = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.3, 2.1), glowMat);
    liftGroup.add(glowRing);
    
    liftGroup.position.set(0, 0, 0);
    
    // --- Animation State ---
    let currentStep = 0;
    let isAnimating = false;
    let targetY = 0;
    let startY = 0;
    let animationProgress = 0;
    
    function updateUI() {
      const container = document.getElementById('servingOrder');
      if (!container) return;
      
      container.innerHTML = '';
      decisionOrder.forEach((floor, idx) => {
        const step = document.createElement('div');
        step.className = 'order-step';
        if (idx < currentStep) {
          step.classList.add('completed');
        }
        if (idx === currentStep && !isAnimating && currentStep < decisionOrder.length) {
          step.classList.add('active');
        }
        step.innerHTML = `${idx + 1}. ${floorNames[floor]} (Score: ${floorScores[floor] || 0})`;
        container.appendChild(step);
      });
    }
    
    function moveToFloor(floorNum) {
      if (isAnimating) return;
      
      targetY = floorYPositions[floorNum];
      startY = liftGroup.position.y;
      animationProgress = 0;
      isAnimating = true;
      
      const statusBadge = document.getElementById('statusBadge');
      statusBadge.textContent = `🚀 Moving to ${floorNames[floorNum]}...`;
      statusBadge.classList.add('animating');
      
      updateUI();
    }
    
    function startNextMove() {
      if (currentStep >= decisionOrder.length) {
        const statusBadge = document.getElementById('statusBadge');
        statusBadge.textContent = '✅ Simulation Complete! All floors served.';
        statusBadge.classList.remove('animating');
        statusBadge.style.background = 'rgba(16, 185, 129, 0.15)';
        statusBadge.style.color = '#10b981';
        return;
      }
      
      const nextFloor = decisionOrder[currentStep];
      moveToFloor(nextFloor);
    }
    
    function resetSimulation() {
      if (isAnimating) return;
      
      currentStep = 0;
      liftGroup.position.y = floorYPositions[0];
      updateUI();
      
      const statusBadge = document.getElementById('statusBadge');
      statusBadge.textContent = '📍 Reset. Starting simulation...';
      statusBadge.classList.remove('animating');
      statusBadge.style.background = 'rgba(16, 185, 129, 0.15)';
      
      setTimeout(() => {
        startNextMove();
      }, 500);
    }
    
    document.getElementById('resetBtn').addEventListener('click', resetSimulation);
    
    // Auto-start simulation
    updateUI();
    setTimeout(() => {
      startNextMove();
    }, 1000);
    
    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      if (isAnimating) {
        animationProgress += 0.03;
        
        if (animationProgress >= 1) {
          liftGroup.position.y = targetY;
          isAnimating = false;
          
          const servedFloor = decisionOrder[currentStep];
          currentStep++;
          
          const statusBadge = document.getElementById('statusBadge');
          statusBadge.textContent = `📍 Arrived at ${floorNames[servedFloor]}`;
          statusBadge.classList.remove('animating');
          
          updateUI();
          
          setTimeout(() => {
            startNextMove();
          }, 1500);
        } else {
          const easeProgress = 1 - Math.pow(1 - animationProgress, 2);
          liftGroup.position.y = startY + (targetY - startY) * easeProgress;
        }
      }
      
      // Pulsing light effect
      const time = Date.now() * 0.003;
      ceilingLight.material.emissiveIntensity = 0.3 + Math.sin(time) * 0.1;
      glowMat.emissiveIntensity = 0.1 + Math.sin(time) * 0.05;
      
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    
    animate();
    
    // Handle window resize
    window.addEventListener('resize', onWindowResize);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    console.log('🎮 3D Simulation Started');
    console.log('📋 Serving order:', decisionOrder.map(f => floorNames[f]));
  </script>
</body>
</html>
