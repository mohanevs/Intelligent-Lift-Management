<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Intelligent Lift Management | Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
  <div class="bg-glow"></div>
  
  <!-- Fullscreen Toggle Button -->
  <div class="fullscreen-btn" id="fullscreenBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
  </div>
  
  <main class="hero-section">
    <div class="container hero-container">
      <div class="badge">AI · NextGen Mobility</div>
      
      <h1 class="gradient-title">
        INTELLIGENT<br>
        <span class="title-accent">LIFT MANAGEMENT</span>
      </h1>
      
      <p class="subheading">
        AI-Powered Priority-Based Elevator System
      </p>
      
      <div class="cta-group">
        <a href="mode.html" class="btn-primary">
          <span>Launch System</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>
  </main>

  <script>
    // Fullscreen functionality
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
    
    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
    
    // Auto fullscreen on load
    document.documentElement.requestFullscreen();
  </script>
</body>
</html>
